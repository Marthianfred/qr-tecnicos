<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GDA Ciclo de Negocio | TrustLayer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#003d9b',
              primary_container: '#0052cc',
              surface: '#f9f9ff',
              surface_container_low: '#f0f3ff',
              surface_container: '#e6e9f5', // derived to be between low and high
              surface_container_high: '#dee1f0', // derived
              surface_container_highest: '#d6e3ff',
              surface_container_lowest: '#ffffff',
              on_surface: '#091c35',
              outline_variant: 'rgba(9, 28, 53, 0.15)',
              error: '#ba1a1a',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Manrope', 'sans-serif'],
            },
            borderRadius: {
              'lg': '0.5rem',
              'sm': '0.125rem',
            },
            boxShadow: {
              'ambient': '0px 12px 32px rgba(9, 28, 53, 0.06)',
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #f9f9ff;
        color: #091c35;
        font-family: 'Inter', sans-serif;
      }
      .font-display {
        font-family: 'Manrope', sans-serif;
        letter-spacing: -0.02em;
      }
      .trust-gradient {
        background: linear-gradient(135deg, #003d9b 0%, #0052cc 100%);
      }
      .glassmorphism {
        background: rgba(0, 61, 155, 0.1);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .glow-pulse {
        box-shadow: 0 0 4px #ba1a1a;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(186, 26, 26, 0.7); }
        70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(186, 26, 26, 0); }
        100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(186, 26, 26, 0); }
      }
      /* No-line rule utility */
      .no-border { border: none !important; }
      
      /* Input ghost border */
      .input-ghost-border {
        border-bottom: 2px solid rgba(9, 28, 53, 0.15);
        transition: border-color 0.2s;
      }
      .input-ghost-border:focus {
        border-color: #003d9b;
        outline: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
